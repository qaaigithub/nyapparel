<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NY Apparel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
            color: #111111;
            padding: 24px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: #ffffff;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #eeeeee;
        }
        .badge {
            display: inline-block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: #f0f0f0;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 600;
            color: #666666;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .domain-box {
            background-color: #f9f9f9;
            border: 1px dashed #cccccc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 40px;
        }
        .domain-name {
            font-family: "Courier New", Courier, monospace;
            font-size: 1.4rem;
            font-weight: bold;
            color: #000000;
            display: block;
            margin: 6px 0;
        }
        .btn-contact {
            display: inline-block;
            background-color: #111111;
            color: #ffffff;
            text-decoration: none;
            padding: 16px 36px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            letter-spacing: 0.5px;
        }
        .btn-contact:hover {
            background-color: #333333;
        }
        .btn-contact:active {
            transform: scale(0.98);
        }
        .cc-notice {
            margin-top: 16px;
            font-size: 0.85rem;
            color: #888888;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Premium Digital Real Estate</div>
        <h1>NY Apparel</h1>
        
        <p class="subtitle">An exceptional, high-tier branding opportunity for fashion, retail, or e-commerce businesses.</p>
        
        <div class="domain-box">
            <p style="font-size: 0.9rem; color: #666666; text-transform: uppercase; letter-spacing: 1px;">Available Domain Portfolios:</p>
            <span class="domain-name">nyapparel.com</span>
            <span class="domain-name">newyorkapparel.com</span>
        </div>

        <!-- The mailto link below automatically adds the main email, CCs the second email, and fills out a professional subject line -->
        <a href="mailto:nyapparel@Yahoo.com?cc=sunesh_shahi@yahoo.com&subject=Inquiry%20Regarding%20NY%20Apparel%20Domains" class="btn-contact">
            Inquire / Make an Offer
        </a>
        
        <p class="cc-notice">Direct inquiries to nyapparel@Yahoo.com with CC to sunesh_shahi@yahoo.com</p>
    </div>

</body>
</html>
